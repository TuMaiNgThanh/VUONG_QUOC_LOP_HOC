<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kingdom Leaderboard - Classroom Kingdom</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#6467f2"
            },
            fontFamily: {
              display: ["Inter", "sans-serif"]
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="./team-showcase.css" />
  </head>
  <body class="bg-slate-100 text-slate-900 font-display min-h-screen">
    <div class="floating-glow floating-glow-1"></div>
    <div class="floating-glow floating-glow-2"></div>

    <header class="sticky top-0 z-50 border-b border-slate-200 bg-white/90 backdrop-blur-md">
      <div class="max-w-6xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between gap-3 flex-wrap">
        <div class="flex items-center gap-3">
          <div class="size-10 bg-primary rounded-xl text-white flex items-center justify-center">
            <span class="material-symbols-outlined">workspace_premium</span>
          </div>
          <div>
            <h1 class="text-lg md:text-xl font-black">Kingdom Leaderboard</h1>
            <p id="welcomeText" class="text-xs md:text-sm text-slate-500">Đang tải thông tin...</p>
          </div>
        </div>
        <div class="leaderboard-header-actions flex items-center gap-2 md:gap-3 flex-wrap justify-end">
          <button id="goProfileBtn" class="px-3 py-2 rounded-lg bg-white border border-slate-200 text-sm font-semibold">Hồ sơ</button>
          <button id="goLibraryBtn" class="px-3 py-2 rounded-lg bg-slate-100 text-sm font-semibold">Thư viện</button>
          <button id="goTeacherBtn" class="px-3 py-2 rounded-lg bg-amber-100 text-amber-700 text-sm font-semibold hidden">Teacher</button>
          <button id="logoutBtn" class="px-3 py-2 rounded-lg bg-slate-900 text-white text-sm font-semibold">Đăng xuất</button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pt-8 pb-32 relative z-10">
      <section class="mb-8">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
          <h2 class="text-2xl md:text-3xl font-black tracking-tight">Bảng xếp hạng Vương Quốc</h2>
          <div class="flex gap-2">
            <button data-filter="all" class="filter-btn">Tất cả học sinh</button>
            <button data-filter="student" class="filter-btn active">Học sinh</button>
          </div>
        </div>

        <div id="podium" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
      </section>

      <section class="bg-white/90 border border-slate-200 rounded-2xl shadow-xl overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
          <h3 class="font-bold text-slate-800">Xếp hạng chi tiết</h3>
          <p id="memberCount" class="text-sm text-slate-500">0 thành viên</p>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left min-w-[680px]">
            <thead>
              <tr class="bg-slate-50">
                <th class="px-4 py-3 text-xs uppercase text-slate-500 font-bold">Hạng</th>
                <th class="px-4 py-3 text-xs uppercase text-slate-500 font-bold">Thành viên</th>
                <th class="px-4 py-3 text-xs uppercase text-slate-500 font-bold">Vai trò</th>
                <th class="px-4 py-3 text-xs uppercase text-slate-500 font-bold text-right">Điểm</th>
              </tr>
            </thead>
            <tbody id="rankingBody" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </section>
    </main>

    <aside class="fixed left-0 right-0 bottom-0 bg-white border-t border-slate-200 py-4 px-5 shadow-[0_-12px_35px_rgba(15,23,42,0.12)] z-50">
      <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
        <div>
          <p class="text-xs uppercase font-bold tracking-wide text-slate-500">Vị trí của bạn</p>
          <p id="myRankText" class="text-lg font-black text-primary">#-</p>
        </div>
        <div class="flex-1 max-w-md hidden md:block">
          <div class="h-2 rounded-full bg-slate-200 overflow-hidden">
            <div id="progressBar" class="h-2 rounded-full bg-primary" style="width: 0%"></div>
          </div>
          <p id="progressText" class="text-xs text-slate-500 mt-1">Đang tính khoảng cách lên hạng trên...</p>
        </div>
        <div class="text-right">
          <p class="text-xs uppercase font-bold tracking-wide text-slate-500">Tổng điểm</p>
          <p id="myPointText" class="text-lg font-black">0 XP</p>
        </div>
      </div>
    </aside>

    <script type="module" src="./team-showcase.js"></script>
  </body>
</html>
